set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',*:RGB'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W#{?window_zoomed_flag, (+),}'
set -g @catppuccin_window_current_text ' #W#{?window_zoomed_flag, (+),}'
set -g @catppuccin_date_time_text ' %a %b %d %H:%M'

if 'test ! -f ~/.config/tmux/plugins/catppuccin/catppuccin.tmux' \
  'run "mkdir -p ~/.config/tmux/plugins/catppuccin && git clone -b v2.3.0 https://github.com/catppuccin/tmux.git ~/.config/tmux/plugins/catppuccin"'
run ~/.config/tmux/plugins/catppuccin/catppuccin.tmux

set -g status-style 'bg=#{@thm_bg}'
set -g status-interval 60
set -g status-left-length 100
set -g status-left ''
set -g status-right-length 100
set -g status-right '#{E:@catppuccin_status_session}'
set -ag status-right '#{E:@catppuccin_status_date_time}'
set -wg pane-active-border-style "#{E:@catppuccin_pane_border_style}"
set -g message-style 'fg=#{@thm_green},bg=#{@thm_bg},fill=#{@thm_bg},align=left'

set -g mouse on
set -g set-clipboard on

set -g history-limit 50000

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10
bind -n M-t new-window -c "#{pane_current_path}"

bind s split-window -v -c '#{pane_current_path}'
bind v split-window -h -c '#{pane_current_path}'

bind r source-file ~/.config/tmux/tmux.conf \; display 'config reloaded'

bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set mouse off \;\
  set status off \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u mouse \;\
  set status on \;\
  refresh-client -S
